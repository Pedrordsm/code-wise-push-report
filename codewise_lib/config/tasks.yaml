analise_estrutura:
  description: >
    Com base na seguinte mensagem de commit: "{input}",
    realize uma inspeção na estrutura do projeto, mapeando diretórios, arquivos e padrões utilizados.
    Considere como essa mudança pode impactar a organização do código.
  expected_output: >
    Relatório arquitetura_atual.md com estrutura, sugestões e justificativas técnicas relacionadas à mudança.
  agent: senior_architect

analise_heuristicas:
  description: >
    Considerando o commit informado: "{input}",
    analise as integrações, bibliotecas externas e APIs afetadas pela mudança.
  expected_output: >
    Documento analise_heuristicas_integracoes.md com mapa de integrações e sugestões com base na alteração feita.
  agent: senior_analytics

analise_solid:
  description: >
    Com base no commit: "{input}",
    avalie a aderência da mudança aos princípios S.O.L.I.D., identificando possíveis violações ou melhorias.
  expected_output: >
    Relatório analise_solid.md com violações e recomendações de refatoração baseadas na alteração feita.
  agent: quality_consultant

padroes_projeto:
  description: >
    A partir da seguinte descrição de commit: "{input}",
    avalie se há aplicação correta ou ausência de padrões de projeto como Singleton, Strategy ou Factory.
  expected_output: >
    Documento padroes_de_projeto.md com sugestões aplicadas ao cenário descrito no commit.
  agent: quality_control_manager

summarize_analysis:
  description: >
    Com base na análise técnica a seguir: "{analysis_result}",
    escreva um resumo objetivo e claro descrevendo o que foi implementado no código analisado com base nas boas práticas de Pull Request.
  expected_output: >
    Um parágrafo bem estruturado com as alterações realizadas, pronto para ser usado como descrição de um Pull Request em (pt-br).
  agent: summary_specialist

ownership_task:
  description: >
    PASSO 1: Use a ferramenta "Obter usuário Git atual" para identificar o desenvolvedor.
    PASSO 2: Copie o nome EXATO retornado pela ferramenta.
    PASSO 3: Identifique arquivos críticos do projeto (ex: main, controllers, models).
    PASSO 4: Use "Calcular Ownership por Arquivo" para verificar ownership desses arquivos.
    PASSO 5: Inicie seu relatório com: "## DESENVOLVEDOR PRINCIPAL: [Nome Exato da Ferramenta]"
  expected_output: >
    Um relatório que DEVE começar com "## DESENVOLVEDOR PRINCIPAL: [Nome]" onde [Nome] é o nome 
    EXATO retornado pela ferramenta "Obter usuário Git atual", seguido de análise de ownership.
  agent: git_analyst

quality_analysis_task:
  description: >
    INSTRUÇÕES:
    1. Leia o relatório da tarefa anterior e identifique o "DESENVOLVEDOR PRINCIPAL" listado.
    2. Copie o nome EXATO desse desenvolvedor (não modifique, não traduza, não invente).
    3. Use a ferramenta "Ler Histórico de Commits do Usuário" com o nome EXATO para buscar os últimos 5 commits.
    4. Para cada commit, use a ferramenta "Ler Código do Commit (Diff)" para analisar a qualidade técnica.
    5. Critique: O código é seguro? Segue padrões? A mensagem do commit condiz com a alteração?
    6. OBRIGATÓRIO: Inicie seu relatório com:
       "## DESENVOLVEDOR PRINCIPAL: [Nome Exato Copiado]"
  expected_output: >
    Um relatório técnico (Markdown) que DEVE começar com "## DESENVOLVEDOR PRINCIPAL: [Nome]" 
    usando o nome EXATO da tarefa anterior, seguido de análises detalhadas dos commits.
  agent: git_analyst

grading_task:
  description: >
    O desenvolvedor sendo avaliado é: {git_user_name}
    
    INSTRUÇÕES OBRIGATÓRIAS:
    1. Leia o relatório da tarefa anterior (quality_analysis_task).
    2. Analise os erros e acertos apontados no relatório.
    3. Decida uma nota de 0 a 10 baseada nos CRITÉRIOS abaixo.
    4. Escreva uma justificativa resumida (2-3 frases).
    5. OBRIGATORIAMENTE chame a ferramenta "Registrar nota de performance" com:
       - author_name: "{git_user_name}" (use EXATAMENTE este nome)
       - score: a nota numérica (0-10)
       - justification: sua justificativa
    
    CRITÉRIOS:
    - Nota < 5: Muitos bugs, código sujo, commits sem sentido.
    - Nota 5-8: Código funcional, mas com melhorias necessárias.
    - Nota > 8: Código exemplar, bem testado, documentado.
    
    CRÍTICO: O nome do desenvolvedor é "{git_user_name}". Use EXATAMENTE este nome.
  expected_output: >
    O texto retornado pela ferramenta "Registrar nota de performance".
  agent: grader_agent

mentoring_task:
  description: >
    Leia a nota final e as justificativas registradas.
    Crie um plano de estudos curto e direto para ajudar o desenvolvedor a subir sua nota.
    Sugira artigos, vídeos ou documentações específicas para os problemas encontrados.
  expected_output: >
    Arquivo 'sugestoes_aprendizado.md' com recursos educacionais organizados por tópico.
  agent: code_mentor

policy_analytics:
  description: >
    Crie um relatório sobre a política de coleta de dados do "{IA_PROVIDER}" para o modelo "{IA_MODEL}"
    com base, e apenas, na documentação oficial. Lembre-se de usar a ferramenta para buscar a documentação oficial.
  expected_output: >
    Relatório analise_politica_coleta_de_dados.md com um resumo dos principais pontos REAIS sobre a política de coleta de dados do provedor a partir da documentação oficial, com as referências (links dos sites utilizados) no fim do arquivo e duas linhas logo ao inicio, reservadas informando APENAS E DIRETAMENTE o provedor e o modelo da api key, da seguinte forma: **providermodeloapikey**.
  agent: dataCollect_policy_analytics

lgpd_judging:
  description: >
    Com base nas leis LGPD e no relatório da analise da documentação,
    determine se o provedor da api key está respeitando ou não as leis LGPD e justifique o julgamento apontando as provas, por meio de um relatório, onde a primeira linha **exatamente na linha 1** do arquivo é a resposta antecipada (sim ou não).
    Lembre-se de usar a ferramenta para buscar as leis LGPD do site oficial (gov.br).
  expected_output: >
    Documento julgamento_lgpd.md com as provas ou artigos utilizados para determinar a decisão tomada.
  agent: lgpd_judge